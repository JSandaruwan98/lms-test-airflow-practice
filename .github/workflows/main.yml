name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Deploy to Azure VM
        # Using a tagged version (v1.0.3) is safer than @master for stability
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          # Increase timeout if your 'git pull' or builds take long
          timeout: 60s 
          script: |
            # 1. Stop the script immediately if any command fails
            set -e

            # 2. Navigate to the project directory
            cd ~/lms-test-airflow-practice

            # 3. Force the local server to match GitHub (ignores manual server changes)
            git fetch --all
            git reset --hard origin/main

            # 4. (Optional) Run updates if needed
            # If you use Docker:
            # docker-compose down && docker-compose up -d --build
            
            # If you use Python/Airflow directly:
            # pip install -r requirements.txt
            
            echo "Deployment to Azure VM 2 successful!"

            cp -r dags/* ~/airflow/dags/
            echo "DAGs copied to Airflow directory!"