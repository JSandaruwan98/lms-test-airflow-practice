name: Deploy to Azure VM 2

on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest code in Azure VM
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            cd lms-test-airflow-practice
            git pull